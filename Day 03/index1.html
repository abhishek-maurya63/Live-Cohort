<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>contact us</h1>
    <form>
        <div><label for="name">name:</label>
        <input type="text" id="name" pattern="[a-zA-Z]+" title="only English Alphabets are allowed" required></div>

        <div><label for="Email">Email:</label>
        <input type="email" id="Email" pattern="[a-z0-9._%+\-]+@[a-z0-9.\-]+\.[a-z]{2,}$" required></div>

        <div></div><label for="Phone Number">Phone Number:</label>
        <input type="tel" id="Phone Number" pattern="[1-9]{10}" title="Digits should be 10" required></div>

        <div></div><label for="Message">Message:</label>
        <input type="textarea" id="Message" required></div>
        <button>Submit</button>

    </form>
</body>
</html>
